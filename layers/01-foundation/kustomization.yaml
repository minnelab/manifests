apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Keep your sort options here to ensure CRDs apply before instances
sortOptions:
  order: legacy
  legacySortOptions:
    orderFirst:
    - Namespace
    - CustomResourceDefinition
    - MutatingWebhookConfiguration
    - ValidatingWebhookConfiguration
    - ResourceQuota
    - StorageClass
    - ServiceAccount
    - PodSecurityPolicy
    - NetworkPolicy
    - Role
    - ClusterRole
    - RoleBinding
    - ClusterRoleBinding
    - ConfigMap
    - Secret
    - Endpoints
    - Service
    - LimitRange
    - PriorityClass
    - PersistentVolume
    - PersistentVolumeClaim
    - Deployment
    - StatefulSet
    - CronJob
    - PodDisruptionBudget


resources:
# Cert-Manager
- ../../common/cert-manager/overlays/kubeflow
# Istio
- ../../common/istio/istio-crds/base
- ../../common/istio/istio-namespace/base
- ../../common/istio/istio-install/overlays/oauth2-proxy
